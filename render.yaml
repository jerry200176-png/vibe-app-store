services:
  - type: web
    name: vibe-app-store
    env: node
    buildCommand: npm install
    startCommand: node server/index.js
    healthCheckPath: /api/health
    disk:
      name: vibe-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /var/data/appstore.db
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_KEY
        generateValue: true
      - key: SITE_CONTACT_EMAIL
        sync: false
